<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient: Rich dark Slate to Indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Flow Swoosh Gradient: Royal Blue -> Vibrant Blue -> Cyan -->
    <linearGradient id="flowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="40%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Grid Lines Pattern (subtle tech overlay) -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#334155" stroke-opacity="0.1" stroke-width="1" />
    </pattern>

    <!-- Box Face Gradients with subtle glowing borders -->
    <linearGradient id="boxTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="boxSides" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.02" />
    </linearGradient>

    <!-- Glowing drop shadow for 3D elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.30" />
    </filter>
  </defs>

  <!-- Deep rounded square backdrop -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Tech Grid overlay -->
  <rect width="512" height="512" rx="128" fill="url(#grid)" />

  <!-- Outer Ring Accent -->
  <rect x="24" y="24" width="464" height="464" rx="104" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="4" />
  
  <g filter="url(#glow)">
    <!-- 1. The Isometric Package / Box (Stock) -->
    <!-- Top Face -->
    <path d="M 256 150 L 380 215 L 256 280 L 132 215 Z" fill="url(#boxTop)" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Left Face -->
    <path d="M 132 215 L 256 280 L 256 395 L 132 330 Z" fill="url(#boxSides)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Right Face -->
    <path d="M 256 280 L 380 215 L 380 330 L 256 395 Z" fill="url(#boxSides)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="3" stroke-linejoin="round" />

    <!-- Corner/Inner seams to complete 3D look -->
    <path d="M 256 280 L 256 395" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="3" />

    <!-- 2. Dynamic Flow Swoop Arrow (Flow) -->
    <!-- Curved tail wrapping from front-left to top-right -->
    <path d="M 100 350 C 120 420, 240 440, 310 370 C 370 310, 395 210, 415 130" 
          stroke="url(#flowGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Sharp Arrowhead at the end of swoop -->
    <path d="M 365 110 L 430 115 L 425 180" 
          stroke="url(#flowGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>